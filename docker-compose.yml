services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Enterprise AX Agent Platform}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-memory}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-local}
      RUNTIME_DIR: ${RUNTIME_DIR:-data/runtime}
      SAMPLE_DOCS_DIR: ${SAMPLE_DOCS_DIR:-data/sample_docs}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      TOP_K: ${TOP_K:-4}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-ax_agent_chunks}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://ax_agent:ax_agent@postgres:5432/ax_agent}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - postgres
      - redis

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ax_agent
      POSTGRES_USER: ax_agent
      POSTGRES_PASSWORD: ax_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  qdrant_data:
  postgres_data:
